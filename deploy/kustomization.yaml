apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-client-ca
images:
- name: ghcr.io/andsens/k8sss-bootstrap
  newTag: 0.1.5
- name: cr.step.sm/smallstep/step-ca
  newTag: 0.29.0
resources:
- namespace.yaml
- kube-client-ca.yaml
configMapGenerator:
- files: [setup-kube-client-ca-config.sh]
  name: kube-client-ca-scripts
- files: [admin.tpl]
  name: kube-client-ca-templates
- files: [kube-client-ca.json]
  name: kube-client-ca-config
generatorOptions:
  disableNameSuffixHash: true
