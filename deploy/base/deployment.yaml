---
apiVersion: v1
kind: Service
metadata:
  name: k8sss
  labels:
    app.kubernetes.io/name: k8sss
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: k8sss
  ports:
  - name: api
    port: 9000
    targetPort: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sss
  labels:
    app.kubernetes.io/name: k8sss
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sss
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sss
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      serviceAccountName: k8sss
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: setup-k8sss-config
        image: ghcr.io/andsens/k8sss-bootstrap
        command: [bash]
        args: [-c, /home/step/setup.sh]
        securityContext:
          readOnlyRootFilesystem: true
        env:
        - name: DNSNAMES
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: config
          subPath: setup.sh
          mountPath: /home/step/setup.sh
        - name: config
          subPath: ca.json
          mountPath: /home/step/ca.json
        - name: admin-keys
          mountPath: /home/step/admin-keys.json
          readOnly: true
          subPath: admin-keys
        - name: k8sss-cert
          mountPath: /home/step/kube-api-secrets/kube_apiserver_client_ca.crt
          readOnly: true
        - name: k8sss-key
          mountPath: /home/step/kube-api-secrets/kube_apiserver_client_ca_key
          readOnly: true
        - name: secrets
          mountPath: /home/step/secrets
        - name: config-rw
          mountPath: /home/step/config
      containers:
      - name: step-ca
        image: cr.step.sm/smallstep/step-ca
        command: [/usr/local/bin/step-ca]
        args: [/home/step/ca.json]
        securityContext:
          readOnlyRootFilesystem: true
        ports:
        - name: api
          containerPort: 9000
        livenessProbe:
          httpGet:
            path: /health
            port: api
            scheme: HTTPS
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: api
            scheme: HTTPS
          initialDelaySeconds: 5
        volumeMounts:
        - name: secrets
          mountPath: /home/step/secrets
          readOnly: true
        - name: config
          subPath: admin.tpl
          mountPath: /home/step/admin.tpl
        - name: config-rw
          subPath: ca.json
          mountPath: /home/step/ca.json
        - name: database
          mountPath: /home/step/db
      volumes:
      - name: config
        configMap:
          name: config
      - name: admin-keys
        configMap:
          name: admin-keys
      - name: secrets
        emptyDir:
          medium: Memory
      - name: k8sss-cert
        hostPath:
          path: /var/lib/rancher/k3s/server/tls/client-ca.crt
          type: File
      - name: k8sss-key
        hostPath:
          path: /var/lib/rancher/k3s/server/tls/client-ca.key
          type: File
      - name: config-rw
        emptyDir: {}
      - name: database
        emptyDir: {}
