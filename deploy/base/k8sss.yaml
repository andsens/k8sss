---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sss
  labels:
    app.kubernetes.io/name: k8sss
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8sss
  labels:
    app.kubernetes.io/name: k8sss
rules:
- apiGroups: [""]
  resources: [services]
  verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8sss
  labels:
    app.kubernetes.io/name: k8sss
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8sss
subjects:
- kind: ServiceAccount
  name: k8sss
---
apiVersion: v1
kind: Service
metadata:
  name: k8sss
  labels:
    app.kubernetes.io/name: k8sss
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: k8sss
  ports:
  - name: api
    port: 9000
    targetPort: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sss
  labels:
    app.kubernetes.io/name: k8sss
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sss
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sss
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      serviceAccountName: k8sss
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: setup-k8sss-config
        image: ghcr.io/andsens/k8sss-bootstrap
        command: [/home/step/scripts/setup-k8sss-config.sh]
        securityContext:
          readOnlyRootFilesystem: true
        env:
        - name: NODENAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: scripts
          mountPath: /home/step/scripts
        - name: config
          mountPath: /home/step/config-ro
        - name: authorized-keys
          mountPath: /home/step/admin_keys
          readOnly: true
        - name: k8sss-cert
          mountPath: /home/step/kube-api-secrets/kube_apiserver_client_ca.crt
          readOnly: true
        - name: k8sss-key
          mountPath: /home/step/kube-api-secrets/kube_apiserver_client_ca_key
          readOnly: true
        - name: secrets
          mountPath: /home/step/secrets
        - name: config-rw
          mountPath: /home/step/config
      containers:
      - name: step-ca
        image: cr.step.sm/smallstep/step-ca
        command: [/usr/local/bin/step-ca]
        args: [/home/step/config/ca.json]
        securityContext:
          readOnlyRootFilesystem: true
        ports:
        - name: api
          containerPort: 9000
        livenessProbe:
          httpGet:
            path: /health
            port: api
            scheme: HTTPS
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: api
            scheme: HTTPS
          initialDelaySeconds: 5
        volumeMounts:
        - name: secrets
          mountPath: /home/step/secrets
          readOnly: true
        - name: templates
          mountPath: /home/step/templates
        - name: config-rw
          mountPath: /home/step/config
        - name: database
          mountPath: /home/step/db
      volumes:
      - name: scripts
        configMap:
          name: k8sss-scripts
          defaultMode: 0755
      - name: config
        configMap:
          name: k8sss-config
      - name: authorized-keys
        hostPath:
          path: /home/admin/.ssh/authorized_keys
          type: File
      - name: templates
        configMap:
          name: k8sss-templates
      - name: secrets
        emptyDir:
          medium: Memory
      - name: k8sss-cert
        hostPath:
          path: /var/lib/rancher/k3s/server/tls/client-ca.crt
          type: File
      - name: k8sss-key
        hostPath:
          path: /var/lib/rancher/k3s/server/tls/client-ca.key
          type: File
      - name: config-rw
        emptyDir: {}
      - name: database
        emptyDir: {}
